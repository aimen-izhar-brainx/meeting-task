[config]
model = "gpt-4o-mini"
fallback_models = ["gpt-4o"]

[pr_reviewer]
require_score_review = false
require_tests_review = true
require_security_review = true
require_focused_review = false
extra_instructions = """
This is a native Android project written in Kotlin, using a mix of Jetpack Compose and XML Views.
Pay attention to ViewModel/Compose state handling, coroutine lifecycle safety, and Gradle/manifest changes.
"""

[pr_description]
publish_labels = true
add_original_user_description = true

[pr_code_suggestions]
num_code_suggestions = 4
extra_instructions = """
Prefer suggestions aligned with Kotlin idioms (null-safety, sealed classes, coroutines) over Java-style patterns.
"""

[github_action_config]
auto_review = true
auto_describe = true
auto_improve = false
